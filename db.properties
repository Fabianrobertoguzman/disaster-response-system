# DRS-Enhanced database connection settings.
# Edit these values to match your local MySQL installation, then run the
# application; no recompilation is required. Environment variables, when set,
# take precedence over this file: DB_URL, DB_USER, DB_PASSWORD.
#
# createDatabaseIfNotExist=true lets the server create the 'drs' database on the
# first connection; the connecting user must therefore hold the CREATE privilege.

db.url=jdbc:mysql://localhost:3306/drs?createDatabaseIfNotExist=true&serverTimezone=UTC&connectTimeout=3000
db.user=root
db.password=changeme
