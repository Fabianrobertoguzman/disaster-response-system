# DRS-Enhanced bundled database connection defaults (last resort).
#
# Resolution order (see edu.cqu.drs.data.Database):
#   1. Environment variables  DB_URL / DB_USER / DB_PASSWORD  (highest precedence)
#   2. An editable ./db.properties in the working directory
#   3. THIS file, packaged on the classpath, as a last-resort default
#
# These values let the application start against a default local MySQL without
# any external configuration. To use different credentials, edit the working-
# directory db.properties or set the environment variables above; no
# recompilation is required.
#
# createDatabaseIfNotExist=true lets the server create the 'drs' database on the
# first connection, so the connecting user must hold the CREATE privilege.

db.url=jdbc:mysql://localhost:3306/drs?createDatabaseIfNotExist=true&serverTimezone=UTC&connectTimeout=3000
db.user=root
db.password=changeme
